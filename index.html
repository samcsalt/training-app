<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Phase 1 - Training App</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0a;--bg2:#141412;--bg3:#1c1c19;--bg4:#242420;--border:#2a2a26;--border2:#383830;--green:#c8f060;--amber:#f0b840;--red:#f06040;--blue:#60b8f0;--purple:#a080f0;--text:#e8e6de;--muted:#88887e;--faint:#44443e;--mono:"IBM Plex Mono",monospace;--sans:"IBM Plex Sans",sans-serif;--safe-bottom:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300}
#app{display:flex;flex-direction:column;height:100%}
#view{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
#tabbar{display:flex;background:var(--bg2);border-top:1px solid var(--border);padding-bottom:var(--safe-bottom);height:calc(60px + var(--safe-bottom));flex-shrink:0;z-index:200}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);transition:color .15s;padding-top:4px}
.tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.tab.active{color:var(--green)}.tab.active.log-tab{color:var(--amber)}.tab.active.lib-tab{color:var(--blue)}
.screen{display:none;padding:0 0 24px}.screen.active{display:block}
.page-header{padding:20px 16px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:50}
.page-label{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--green);margin-bottom:4px}
.page-label.amber{color:var(--amber)}.page-label.blue{color:var(--blue)}
.page-title{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--text);letter-spacing:-.02em}
.pill{display:inline-block;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:3px;border:1px solid}
.pill-red{color:var(--red);border-color:#4a1a0a;background:#200a04}
.pill-amber{color:var(--amber);border-color:#4a3a0a;background:#200a04}

/* PROGRAM */
.week-scroll{display:flex;gap:8px;overflow-x:auto;padding:12px 16px;scrollbar-width:none}
.week-scroll::-webkit-scrollbar{display:none}
.week-btn{flex-shrink:0;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:7px 14px;border-radius:4px;border:1px solid var(--border2);background:var(--bg3);color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .12s}
.week-btn.active{background:var(--bg4);border-color:var(--green);color:var(--green)}
.days-wrap{padding:4px 16px 16px;display:flex;flex-direction:column;gap:10px}
.day-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.day-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none}
.day-pip{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pip-upper{background:var(--green)}.pip-lower{background:var(--amber)}.pip-cond{background:var(--purple)}.pip-rest{background:var(--faint)}
.day-label-wrap{flex:1}
.day-name{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text)}
.day-sub{font-size:11px;color:var(--muted);margin-top:2px}
.day-chevron{font-family:var(--mono);font-size:11px;color:var(--faint);transition:transform .2s}
.day-card.open .day-chevron{transform:rotate(180deg)}
.day-body{display:none;border-top:1px solid var(--border)}.day-card.open .day-body{display:block}
.ex-section-label{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:10px 16px 4px;color:var(--faint)}
.ex-section-label.mob{color:#3060a0}
.ex-row{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border)}
.ex-row:last-child{border-bottom:none}
.ex-row.mob-row{background:#0a0a14}.ex-row.tendon-row{background:#140808}
.ex-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.ex-main{flex:1;min-width:0}
.ex-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.3}
.ex-name.watch{color:var(--red)}.ex-name.new{color:var(--amber)}.ex-name.mob{color:var(--blue)}.ex-name.tendon{color:var(--red)}
.ex-sets{font-family:var(--mono);font-size:11px;color:var(--green);margin-top:3px}
.ex-sets.mob{color:var(--blue)}.ex-sets.tendon{color:var(--red)}
.ex-note{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5}
.swap-btn{flex-shrink:0;background:transparent;border:1px solid var(--border2);border-radius:4px;color:var(--muted);font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:4px 8px;cursor:pointer;margin-top:2px;transition:all .12s;white-space:nowrap}
.swap-btn:hover{color:var(--amber);border-color:var(--amber)}
.swap-btn.swapped{color:var(--amber);border-color:var(--amber);background:#1a0e00}

/* SWAP MODAL */
#swap-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:flex-end;justify-content:center}
#swap-overlay.open{display:flex}
#swap-sheet{background:var(--bg2);border:1px solid var(--border);border-radius:14px 14px 0 0;width:100%;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;padding-bottom:var(--safe-bottom)}
#swap-header{padding:16px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
#swap-title{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--amber);margin-bottom:4px}
#swap-ex-name{font-size:15px;font-weight:500;color:var(--text);margin-bottom:10px}
#swap-search{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:5px;color:var(--text);font-family:var(--sans);font-size:14px;padding:8px 12px;outline:none;margin-bottom:8px}
#swap-search:focus{border-color:var(--amber)}
#swap-search::placeholder{color:var(--faint)}
.swap-filter-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.swap-filter-row::-webkit-scrollbar{display:none}
.swap-filter-chip{flex-shrink:0;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:4px 9px;border-radius:3px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap}
.swap-filter-chip.active{color:var(--amber);border-color:var(--amber);background:#1a0e00}
#swap-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 0}
.swap-ex-item{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.swap-ex-item:active{background:var(--bg3)}
.swap-ex-item:last-child{border-bottom:none}
.swap-item-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.swap-item-info{flex:1;min-width:0}
.swap-item-name{font-size:13px;font-weight:500;color:var(--text)}
.swap-item-meta{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
.swap-item-arrow{color:var(--faint);font-size:14px}
.swap-list-empty{text-align:center;padding:32px 16px;color:var(--muted);font-family:var(--mono);font-size:11px}
#swap-cancel{margin:8px 16px;padding:12px;background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--muted);font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;flex-shrink:0}

/* SCOPE MODAL */
#scope-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:600;align-items:flex-end;justify-content:center}
#scope-overlay.open{display:flex}
#scope-sheet{background:var(--bg2);border:1px solid var(--border);border-radius:14px 14px 0 0;width:100%;padding:20px 16px;padding-bottom:calc(20px + var(--safe-bottom))}
#scope-title{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin-bottom:6px}
#scope-desc{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.5}
.scope-btn{width:100%;padding:14px 16px;border-radius:6px;font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;margin-bottom:8px;text-align:left}
.scope-btn-week{background:#1a0e00;border:1px solid var(--amber);color:var(--amber)}
.scope-btn-phase{background:#001814;border:1px solid var(--blue);color:var(--blue)}
.scope-btn-cancel{background:transparent;border:1px solid var(--border2);color:var(--muted);margin-bottom:0}
.scope-btn-sub{display:block;font-size:9px;font-weight:400;letter-spacing:.04em;color:inherit;opacity:.7;margin-top:3px;text-transform:none}

/* LOG */
.log-week-sel{display:flex;gap:8px;overflow-x:auto;padding:12px 16px 0;scrollbar-width:none}
.log-week-sel::-webkit-scrollbar{display:none}
.log-week-chip{flex-shrink:0;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:5px 12px;border-radius:4px;border:1px solid var(--border2);background:var(--bg3);color:var(--muted);cursor:pointer;white-space:nowrap}
.log-week-chip.active{background:var(--bg4);border-color:var(--amber);color:var(--amber)}
.log-day-tabs{display:flex;gap:6px;overflow-x:auto;padding:12px 16px;scrollbar-width:none}
.log-day-tabs::-webkit-scrollbar{display:none}
.log-day-btn{flex-shrink:0;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:6px 12px;border-radius:4px;border:1px solid var(--border2);background:var(--bg3);color:var(--muted);cursor:pointer;white-space:nowrap}
.log-day-btn.active{background:var(--bg4);border-color:var(--amber);color:var(--amber)}
.log-body{padding:8px 16px 24px}
.log-section-label{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:14px 0 8px}

/* PREHAB BLOCK */
.prehab-block{background:var(--bg2);border:1px solid #1c1c2e;border-radius:6px;margin-bottom:8px;overflow:hidden}
.prehab-block-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;user-select:none;background:#0d0d1c}
.prehab-block-left{display:flex;align-items:center;gap:8px}
.prehab-block-title{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#6888c8}
.prehab-block-progress{font-family:var(--mono);font-size:10px;color:var(--muted)}
.prehab-block-chev{font-family:var(--mono);font-size:10px;color:var(--faint);transition:transform .2s}
.prehab-block.collapsed .prehab-block-chev{transform:rotate(-90deg)}
.prehab-block.collapsed .prehab-block-body{display:none}
.prehab-row{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border)}
.prehab-row:last-child{border-bottom:none}
.prehab-row.tendon-row{background:#140808}
.prehab-check{width:22px;height:22px;border-radius:4px;border:1.5px solid var(--border2);background:var(--bg4);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .12s}
.prehab-check.done{background:#1a3a0a;border-color:var(--green);color:var(--green)}
.prehab-check.tendon-done{background:#3a0a0a;border-color:var(--red);color:var(--red)}
.prehab-info{flex:1;min-width:0}
.prehab-name{font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.prehab-name.tendon-name{color:var(--red)}
.prehab-sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px;line-height:1.4}
.tendon-load-row{display:flex;align-items:center;gap:8px;margin-top:7px}
.tendon-load-label{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
.tendon-load-input{background:var(--bg4);border:1px solid #2a1010;border-radius:4px;color:var(--text);font-family:var(--mono);font-size:13px;font-weight:500;padding:5px 8px;width:72px;text-align:center;outline:none}
.tendon-load-input:focus{border-color:var(--red)}
.tendon-load-input::placeholder{color:var(--faint)}
.pain-row{display:flex;align-items:center;gap:6px;margin-top:7px;flex-wrap:wrap}
.pain-label{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);flex-shrink:0}
.pain-btns{display:flex;gap:3px;flex-wrap:wrap}
.pain-btn{width:26px;height:26px;border-radius:3px;border:1px solid var(--border2);background:var(--bg4);color:var(--muted);font-family:var(--mono);font-size:11px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s}
.pain-btn.p0,.pain-btn.p1,.pain-btn.p2{background:#0e1a04;border-color:#3a5a10;color:var(--green)}
.pain-btn.p3,.pain-btn.p4{background:#1a1200;border-color:#4a3800;color:#d0a030}
.pain-btn.p5,.pain-btn.p6{background:#1a0800;border-color:#4a2000;color:#e07030}
.pain-btn.p7,.pain-btn.p8,.pain-btn.p9,.pain-btn.p10{background:#1a0400;border-color:#4a1000;color:var(--red)}
.prehab-notes-row{padding:8px 14px;border-top:1px solid var(--border);background:#0d0d1c}
.prehab-notes-label{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:4px}
.prehab-notes-input{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:var(--sans);font-size:13px;padding:7px 10px;resize:none;outline:none;line-height:1.4}
.prehab-notes-input:focus{border-color:#4060b0}
.prehab-notes-input::placeholder{color:var(--faint)}

/* TRAINING CARDS */
.log-ex-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;margin-bottom:8px;overflow:hidden}
.log-ex-header{display:flex;align-items:flex-start;gap:8px;padding:10px 14px;cursor:pointer;user-select:none}
.log-ex-header-info{flex:1;min-width:0}
.log-ex-name{font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.log-ex-name.watch{color:var(--red)}
.log-ex-sub-badge{display:inline-block;font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:2px 5px;border-radius:2px;border:1px solid var(--amber);color:var(--amber);background:#1a0e00;vertical-align:middle}
.log-ex-prescribed{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
.log-ex-progress{font-family:var(--mono);font-size:11px;color:var(--muted);flex-shrink:0;text-align:right;margin-top:2px}
.log-ex-progress.complete{color:var(--green)}
.log-ex-chev{font-family:var(--mono);font-size:10px;color:var(--faint);flex-shrink:0;margin-top:3px;transition:transform .2s}
.log-ex-card.collapsed .log-ex-chev{transform:rotate(-90deg)}
.log-ex-card.collapsed .log-ex-sets{display:none}
.log-ex-sets{border-top:1px solid var(--border)}
.set-row{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--border)}
.set-row:last-of-type{border-bottom:none}
.set-row.done-row{background:rgba(200,240,96,.04)}
.set-num{font-family:var(--mono);font-size:10px;color:var(--faint);width:38px;flex-shrink:0}
.set-input{background:var(--bg4);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:13px;font-weight:500;padding:5px 6px;width:62px;text-align:center;outline:none}
.set-input:focus{border-color:var(--amber)}
.set-input::placeholder{color:var(--faint);font-size:11px}
.set-timed{background:var(--bg4);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:13px;font-weight:500;padding:5px 6px;width:90px;text-align:center;outline:none}
.set-timed:focus{border-color:var(--amber)}
.set-timed::placeholder{color:var(--faint);font-size:11px}
.set-x{font-family:var(--mono);font-size:11px;color:var(--faint)}
.set-check{margin-left:auto;width:28px;height:28px;border-radius:5px;border:1.5px solid var(--border2);background:var(--bg4);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all .12s}
.set-check.done{background:#1a3a0a;border-color:var(--green);color:var(--green)}
.rpe-row{display:flex;align-items:center;gap:8px;padding:7px 12px;border-top:1px solid var(--border);background:var(--bg3)}
.rpe-label{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);flex-shrink:0}
.rpe-btns{display:flex;gap:4px}
.rpe-btn{width:26px;height:26px;border-radius:3px;border:1px solid var(--border2);background:var(--bg4);color:var(--muted);font-family:var(--mono);font-size:11px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s}
.rpe-btn.sel-6{background:#0e1a04;border-color:var(--green);color:var(--green);font-weight:700}
.rpe-btn.sel-7,.rpe-btn.sel-8{background:#1a1200;border-color:var(--amber);color:var(--amber);font-weight:700}
.rpe-btn.sel-9{background:#1a0800;border-color:#e07030;color:#e07030;font-weight:700}
.rpe-btn.sel-10{background:#1a0400;border-color:var(--red);color:var(--red);font-weight:700}
.ex-notes-row{padding:7px 12px;border-top:1px solid var(--border);background:var(--bg3)}
.ex-notes-input{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:var(--sans);font-size:13px;padding:6px 8px;resize:none;outline:none;line-height:1.4}
.ex-notes-input:focus{border-color:var(--amber)}
.ex-notes-input::placeholder{color:var(--faint)}

/* REPORT */
.week-report-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;margin:8px 0}
.report-field{margin-bottom:10px}.report-field:last-child{margin-bottom:0}
.report-field label{display:block;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.report-field textarea{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 10px;outline:none;resize:none;height:52px;transition:border-color .12s}
.report-field textarea:focus{border-color:var(--amber)}
.copy-btn{width:100%;padding:14px;margin-top:12px;background:var(--bg4);border:1px solid var(--amber);border-radius:6px;color:var(--amber);font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .15s}
.copy-btn:active{background:#2a1e00}
.copy-btn.copied{background:#1a2800;border-color:var(--green);color:var(--green)}
.clear-btn{width:100%;padding:11px;margin-top:8px;background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--muted);font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}

/* LIBRARY */
.lib-search-wrap{padding:12px 16px 8px;position:relative}
.lib-search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:12px;color:var(--muted);pointer-events:none}
#lib-search{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--sans);font-size:14px;padding:10px 12px 10px 34px;outline:none;transition:border-color .12s}
#lib-search:focus{border-color:var(--blue)}
#lib-search::placeholder{color:var(--faint)}
.lib-filters{display:flex;gap:5px;overflow-x:auto;padding:0 16px 10px;scrollbar-width:none}
.lib-filters::-webkit-scrollbar{display:none}
.lib-filter{flex-shrink:0;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:5px 10px;border-radius:3px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap}
.lib-filter.active{background:var(--bg4);color:var(--text);border-color:var(--border2)}
.lib-filter.active[data-val="strength"]{border-color:var(--green);color:var(--green)}
.lib-filter.active[data-val="skill"]{border-color:var(--amber);color:var(--amber)}
.lib-filter.active[data-val="mobility"]{border-color:var(--blue);color:var(--blue)}
.lib-filter.active[data-val="conditioning"]{border-color:var(--purple);color:var(--purple)}
.lib-filter.active[data-val="none"]{border-color:var(--green);color:var(--green)}
.lib-filter.active[data-val="low"]{border-color:var(--amber);color:var(--amber)}
.lib-filter.active[data-val="moderate"]{border-color:#f08040;color:#f08040}
.lib-filter.active[data-val="high"]{border-color:var(--red);color:var(--red)}
.lib-filter.active[data-val="yes"]{border-color:var(--green);color:var(--green)}
.lib-count{font-family:var(--mono);font-size:10px;color:var(--muted);padding:0 16px 8px}
.lib-count span{color:var(--blue);font-weight:600}
.lib-grid{padding:0 16px 16px;display:flex;flex-direction:column;gap:8px}
.lib-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer}
.lib-card-header{display:flex;align-items:center;gap:10px;padding:12px 14px}
.lib-risk-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.risk-none{background:var(--green)}.risk-low{background:var(--amber)}.risk-moderate{background:#f08040}.risk-high{background:var(--red)}
.lib-card-name{flex:1;font-size:13px;font-weight:500;color:var(--text)}
.lib-card-chev{font-family:var(--mono);font-size:10px;color:var(--faint);transition:transform .15s}
.lib-card.open .lib-card-chev{transform:rotate(180deg)}
.lib-card-tags{display:flex;gap:4px;flex-wrap:wrap;padding:0 14px 10px}
.lib-tag{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;padding:2px 6px;border-radius:2px;border:1px solid}
.lib-tag-strength{color:var(--green);border-color:#2a3a0a;background:#0e1a04}
.lib-tag-skill{color:var(--amber);border-color:#3a2a0a;background:#1a0e04}
.lib-tag-mobility{color:var(--blue);border-color:#0a2a3a;background:#040e18}
.lib-tag-conditioning{color:var(--purple);border-color:#2a1a3a;background:#0e0418}
.lib-tag-plain{color:var(--faint);border-color:var(--border);background:transparent}
.lib-tag-inprog{color:var(--green);border-color:#2a3a0a;background:#0e1a04}
.lib-card-expand{display:none;border-top:1px solid var(--border);padding:12px 14px}
.lib-card.open .lib-card-expand{display:block}
.lib-muscles{font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.5}
.lib-muscles strong{color:var(--text);font-weight:500}
.lib-notes{font-size:12px;color:var(--muted);line-height:1.6}
.lib-risk-label{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-top:10px;padding:5px 8px;border-radius:3px;display:inline-block}
.risk-label-none{color:var(--green);background:#0e1a04}.risk-label-low{color:var(--amber);background:#1a0e04}
.risk-label-moderate{color:#f08040;background:#1a0804}.risk-label-high{color:var(--red);background:#1a0404}
.lib-empty{text-align:center;padding:48px 16px;color:var(--muted);font-family:var(--mono);font-size:12px}
</style>
</head>

</div>
<div id="swap-overlay" onclick="closeSwapIfBg(event)">

      <input type="text" id="swap-search" placeholder="Search library..." oninput="filterSwapList()">

    </div>
    <div id="swap-list"></div>
    <button id="swap-cancel" onclick="closeSwap()">Cancel</button>
  </div>
</div>
<div id="scope-overlay" onclick="closeScopeIfBg(event)">

  </div>
</div>

function wKey(w,di,ei,m){return`week_${w}_d${di}_${m?"mob":"ex"}_${ei}`;}
function pKey(di,ei,m){return`phase_d${di}_${m?"mob":"ex"}_${ei}`;}
function getEx(w,di,ei,mob){
  const sw=loadSwaps(),wk=wKey(w,di,ei,mob),pk=pKey(di,ei,mob);
  const arr=mob?DAYS[di].mobility:DAYS[di].exercises,orig=arr[ei];
  const sn=sw[wk]||sw[pk]||null;
  if(!sn)return{ex:orig,isSub:false,origName:null};
  const f=EXERCISES.find(e=>e.name===sn);
  if(!f)return{ex:orig,isSub:false,origName:null};
  return{ex:{name:f.name,sets:orig.sets,reps:orig.reps,note:"[Sub for "+orig.name+"] "+f.notes,flags:orig.flags,timed:orig.timed,pattern:f.pattern},isSub:true,origName:orig.name};
}
function rKey(w,i){return`w${w}_report_${i}`;}

function switchTab(name,el){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById("screen-"+name).classList.add("active");
  el.classList.add("active");
  document.getElementById("view").scrollTop=0;
}

// PROGRAM
function buildProgram(){
  document.getElementById("week-scroll").innerHTML=WEEKS.map((w,i)=>
    `<button class="week-btn ${i===activeWeek?"active":""}" onclick="selWeek(${i},this)">${w.label}<br><span style="font-size:9px;opacity:.6">${w.dates}</span></button>`
  ).join("");
  renderDays();
}
function selWeek(i,el){activeWeek=i;document.querySelectorAll(".week-btn").forEach(b=>b.classList.remove("active"));el.classList.add("active");renderDays();}
function pipCls(t){return{upper:"pip-upper",lower:"pip-lower",cond:"pip-cond"}[t]||"pip-rest";}
function flagPill(f){
  if(f.includes("w"))return'<span class="pill pill-red">&#9888; Tendon watch</span>';
  if(f.includes("t"))return'<span class="pill pill-red">&#9873; Tendon protocol</span>';
  if(f.includes("n"))return'<span class="pill pill-amber">New</span>';
  return"";
}
function renderDays(){
  document.getElementById("days-wrap").innerHTML=DAYS.map((d,di)=>{
    const exRows=d.exercises.map((o,ei)=>{
      const{ex,isSub,origName}=getEx(activeWeek,di,ei,false);
      const nc=ex.flags.includes("w")?"watch":ex.flags.includes("n")?"new":"";
      const dc=ex.flags.includes("w")?"var(--red)":isSub?"var(--amber)":ex.flags.includes("n")?"var(--amber)":"var(--faint)";
      return`<div class="ex-row"><div class="ex-dot" style="background:${dc}"></div><div class="ex-main">
        <div class="ex-name ${nc}">${ex.name} ${flagPill(ex.flags)} ${isSub?'<span class="pill pill-amber">&#8644; Sub</span>':""}</div>
        ${isSub?`<div style="font-size:10px;color:var(--muted);margin-top:1px">&#8627; replaces ${origName}</div>`:""}
        <div class="ex-sets">${ex.sets} sets &times; ${ex.reps}</div><div class="ex-note">${ex.note}</div>
      </div><button class="swap-btn ${isSub?"swapped":""}" onclick="event.stopPropagation();openSwap(${di},${ei},false,'${ex.pattern||"pull"}')">${isSub?"&#8644; Swap":"Swap"}</button></div>`;
    }).join("");
    const mobRows=d.mobility.map((o,mi)=>{
      const{ex,isSub,origName}=getEx(activeWeek,di,mi,true);
      const it=ex.flags.includes("t");
      return`<div class="ex-row ${it?"tendon-row":"mob-row"}"><div class="ex-dot" style="background:${it?"var(--red)":"var(--blue)"}"></div><div class="ex-main">
        <div class="ex-name ${it?"tendon":"mob"}">${ex.name} ${it?'<span class="pill pill-red">&#9873; Protocol</span>':""} ${isSub?'<span class="pill pill-amber">&#8644; Sub</span>':""}</div>
        ${isSub?`<div style="font-size:10px;color:var(--muted);margin-top:1px">&#8627; replaces ${origName}</div>`:""}
        <div class="ex-sets ${it?"tendon":"mob"}">${ex.sets} sets &times; ${ex.reps}</div><div class="ex-note">${ex.note}</div>
      </div><button class="swap-btn ${isSub?"swapped":""}" onclick="event.stopPropagation();openSwap(${di},${mi},true,'${ex.pattern||"pull"}')">${isSub?"&#8644; Swap":"Swap"}</button></div>`;
    }).join("");
    return`<div class="day-card" id="pd-${di}">
      <div class="day-header" onclick="toggleDay(${di})">
        <div class="day-pip ${pipCls(d.type)}"></div>
        <div class="day-label-wrap"><div class="day-name">${d.day} &mdash; ${d.label}</div><div class="day-sub">${d.sub}</div></div>
        <div class="day-chevron">&#9662;</div>
      </div>
      <div class="day-body">
        <div class="ex-section-label">Training</div>${exRows}
        <div class="ex-section-label mob">Mobility & Tendon Work &middot; ~10-15 min</div>${mobRows}
      </div></div>`;
  }).join("");
}
function toggleDay(di){document.getElementById(`pd-${di}`).classList.toggle("open");}

// SWAP MODAL
function openSwap(di,ei,mob,pattern){
  swapCtx={di,ei,mob,pattern};swapFilter=pattern||"all";
  const{ex}=getEx(activeWeek,di,ei,mob);
  document.getElementById("swap-ex-name").textContent=ex.name;
  document.getElementById("swap-search").value="";
  const pats=["all","push","pull","hinge","squat","core","carry"];
  document.getElementById("swap-filter-row").innerHTML=pats.map(p=>
    `<button class="swap-filter-chip ${swapFilter===p?"active":""}" onclick="setSF('${p}',this)">${p==="all"?"All patterns":p}</button>`
  ).join("");
  filterSwapList();
  document.getElementById("swap-overlay").classList.add("open");
  document.getElementById("swap-search").focus();
}
function setSF(p,el){swapFilter=p;document.querySelectorAll(".swap-filter-chip").forEach(c=>c.classList.remove("active"));el.classList.add("active");filterSwapList();}
function filterSwapList(){
  const q=document.getElementById("swap-search").value.toLowerCase();
  const f=EXERCISES.filter(ex=>{
    if(swapFilter!=="all"&&ex.pattern!==swapFilter)return false;
    if(q){const s=[ex.name,ex.muscles,ex.category,ex.pattern,ex.notes].join(" ").toLowerCase();if(!s.includes(q))return false;}
    return true;
  });
  const list=document.getElementById("swap-list");
  if(!f.length){list.innerHTML='<div class="swap-list-empty">No exercises match.</div>';return;}
  const rc={none:"var(--green)",low:"var(--amber)",moderate:"#f08040",high:"var(--red)"};
  list.innerHTML=f.map(ex=>
    `<div class="swap-ex-item" onclick="selSwapEx('${ex.name.replace(/'/g,"\'")}')">
      <div class="swap-item-dot" style="background:${rc[ex.risk]||"var(--faint)"}"></div>
      <div class="swap-item-info"><div class="swap-item-name">${ex.name}</div>
      <div class="swap-item-meta">${ex.category} &middot; ${ex.pattern} &middot; ${ex.difficulty} &middot; tendon: ${ex.risk}</div></div>
      <div class="swap-item-arrow">&#8250;</div></div>`
  ).join("");
}
function selSwapEx(name){
  swapPending={...swapCtx,newName:name};closeSwap();
  const{ex}=getEx(activeWeek,swapCtx.di,swapCtx.ei,swapCtx.mob);
  document.getElementById("scope-desc").textContent=`Replacing "${ex.name}" with "${name}"`;
  document.getElementById("scope-overlay").classList.add("open");
}
function closeSwap(){document.getElementById("swap-overlay").classList.remove("open");}
function closeSwapIfBg(e){if(e.target===document.getElementById("swap-overlay"))closeSwap();}
function closeScope(){document.getElementById("scope-overlay").classList.remove("open");swapPending=null;}
function closeScopeIfBg(e){if(e.target===document.getElementById("scope-overlay"))closeScope();}
function confirmSwap(scope){
  if(!swapPending)return;
  const{di,ei,mob,newName}=swapPending,sw=loadSwaps();
  if(scope==="week"){sw[wKey(activeWeek,di,ei,mob)]=newName;}
  else{sw[pKey(di,ei,mob)]=newName;for(let w=0;w<activeWeek;w++)delete sw[wKey(w,di,ei,mob)];}
  saveSwaps(sw);closeScope();swapPending=null;renderDays();
}

// LOG - PREHAB
function buildPrehabBlock(di,logData){
  const d=DAYS[di],base=`w${logWeek}_d${di}`;
  const done=d.mobility.filter((_,mi)=>logData[`${base}_mob${mi}_done`]).length;
  const notesKey=`${base}_prehab_notes`;
  let rows=d.mobility.map((o,mi)=>{
    const{ex:m,isSub,origName}=getEx(logWeek,di,mi,true);
    const it=m.flags.includes("t"),inn=m.flags.includes("n");
    const doneKey=`${base}_mob${mi}_done`,isDone=!!logData[doneKey];
    const chkCls=isDone?(it?"tendon-done":"done"):"";
    const loadKey=`${base}_mob${mi}_load`,painKey=`${base}_mob${mi}_pain`;
    const sv_load=logData[loadKey]||"",sv_pain=logData[painKey];
    let tendonHtml="";
    if(it){
      let painBtns="";
      for(let i=0;i<=10;i++){
        const sel=sv_pain===i;
        painBtns+=`<button class="pain-btn ${sel?"p"+i:""}" id="pb_${base}_${mi}_${i}" onclick="setPain('${base}',${mi},${i})">${i}</button>`;
      }
      tendonHtml=`<div class="tendon-load-row"><span class="tendon-load-label">Load</span>
        <input class="tendon-load-input" type="number" inputmode="decimal" step=".5" placeholder="&mdash; lbs" value="${sv_load}" onchange="saveF('${loadKey}',this.value)">
      </div><div class="pain-row"><span class="pain-label">Pain</span><div class="pain-btns">${painBtns}</div></div>`;
    }
    const subBdg=isSub?`<span style="font-size:9px;font-family:var(--mono);font-weight:600;letter-spacing:.05em;color:var(--amber);border:1px solid var(--amber);border-radius:2px;padding:1px 5px;">SUB</span>`:"";
    const tb=it?'<span class="pill pill-red" style="font-size:8px;padding:2px 5px;">&#9873;</span>':"";
    const nb=inn?'<span class="pill pill-amber" style="font-size:8px;padding:2px 5px;">New</span>':"";
    return`<div class="prehab-row ${it?"tendon-row":""}" id="pr_${base}_${mi}">
      <div class="prehab-check ${chkCls}" id="pc_${base}_${mi}" onclick="togglePrehab('${base}',${mi},${it})">${isDone?"&#10003;":""}</div>
      <div class="prehab-info">
        <div class="prehab-name ${it?"tendon-name":""}">${m.name}${tb}${nb}${subBdg}</div>
        <div class="prehab-sub">${m.sets} &times; ${m.reps} &middot; ${m.note}</div>
        ${tendonHtml}
      </div></div>`;
  }).join("");
  return`<div class="prehab-block" id="pb_${di}">
    <div class="prehab-block-header" onclick="togglePBBlock(${di})">
      <div class="prehab-block-left"><span class="prehab-block-title">Warmup & Prehab</span><span class="prehab-block-progress" id="pp_${di}">${done}/${d.mobility.length}</span></div>
      <span class="prehab-block-chev">&#9662;</span>
    </div>
    <div class="prehab-block-body">
      ${rows}
      <div class="prehab-notes-row">
        <div class="prehab-notes-label">Notes</div>
        <textarea class="prehab-notes-input" rows="2" placeholder="Elbow tightness, knee status, how prehab felt..." onchange="saveF('${notesKey}',this.value)">${logData[notesKey]||""}</textarea>
      </div>
    </div></div>`;
}
function togglePBBlock(di){document.getElementById(`pb_${di}`).classList.toggle("collapsed");}
function togglePrehab(base,mi,isTendon){
  const data=loadLog(),key=`${base}_mob${mi}_done`;
  data[key]=!data[key];saveLog(data);
  const isDone=!!data[key];
  const chk=document.getElementById(`pc_${base}_${mi}`);
  chk.innerHTML=isDone?"&#10003;":"";
  chk.className="prehab-check"+(isDone?(isTendon?" tendon-done":" done"):"");
  const di=parseInt(base.split("_d")[1]);
  const mob=DAYS[di].mobility;
  const done=mob.filter((_,mi2)=>data[`${base}_mob${mi2}_done`]).length;
  const pp=document.getElementById(`pp_${di}`);if(pp)pp.textContent=`${done}/${mob.length}`;
}
function setPain(base,mi,val){
  const data=loadLog(),key=`${base}_mob${mi}_pain`;
  data[key]=(data[key]===val)?undefined:val;saveLog(data);
  const saved=data[key];
  for(let i=0;i<=10;i++){const b=document.getElementById(`pb_${base}_${mi}_${i}`);if(b)b.className="pain-btn"+(saved===i?" p"+i:"");}
}

// LOG - TRAINING CARDS
function buildTrainingCard(ex,ck,logData,isSub,origName){
  const it=ex.timed,iw=ex.flags.includes("w"),ns=ex.sets;
  const savedRPE=logData[`${ck}_rpe`],savedNotes=logData[`${ck}_notes`]||"";
  let done=0;for(let s=0;s<ns;s++)if(logData[`${ck}_s${s}_done`])done++;
  const allDone=done===ns;
  const sub=isSub?'<span class="log-ex-sub-badge">Sub</span>':"";
  const wb=iw?'<span class="pill pill-red" style="font-size:8px;padding:2px 5px;">&#9888;</span>':"";
  let setRows="";
  for(let s=0;s<ns;s++){
    const sk=`${ck}_s${s}`,isDone=!!logData[`${sk}_done`];
    const sl=logData[`${sk}_load`]||"",sr=logData[`${sk}_reps`]||"",ss=logData[`${sk}_sec`]||"";
    if(it){
      setRows+=`<div class="set-row ${isDone?"done-row":""}" id="${sk}_row">
        <span class="set-num">Set ${s+1}</span>
        <input class="set-timed" type="number" inputmode="numeric" placeholder="${ex.reps}" value="${ss}" onchange="saveSF('${sk}','sec',this.value,'${ck}',${ns})">
        <div class="set-check ${isDone?"done":""}" id="${sk}_chk" onclick="toggleSet('${sk}','${ck}',${ns})">${isDone?"&#10003;":""}</div>
      </div>`;
    } else {
      setRows+=`<div class="set-row ${isDone?"done-row":""}" id="${sk}_row">
        <span class="set-num">Set ${s+1}</span>
        <input class="set-input" type="number" inputmode="decimal" step=".5" placeholder="lbs" value="${sl}" onchange="saveSF('${sk}','load',this.value,'${ck}',${ns})">
        <span class="set-x">&times;</span>
        <input class="set-input" type="number" inputmode="numeric" placeholder="${ex.reps}" value="${sr}" onchange="saveSF('${sk}','reps',this.value,'${ck}',${ns})">
        <div class="set-check ${isDone?"done":""}" id="${sk}_chk" onclick="toggleSet('${sk}','${ck}',${ns})">${isDone?"&#10003;":""}</div>
      </div>`;
    }
  }
  const rpeBtns=[6,6.5,7,7.5,8,8.5,9,9.5,10].map(v=>{
    const sel=savedRPE==v;
    const tier=v>=9.5?"sel-10":v>=9?"sel-9":v>=7.5?"sel-8":v>=6.5?"sel-7":"sel-6";
    return`<button class="rpe-btn ${sel?tier:""}" id="rpe_${ck}_${String(v).replace(".","_")}" onclick="setRPE('${ck}',${v})">${v}</button>`;
  }).join("");
  return`<div class="log-ex-card" id="ec_${ck}">
    <div class="log-ex-header" onclick="toggleEx('${ck}')">
      <div class="log-ex-header-info">
        <div class="log-ex-name ${iw?"watch":""}">${ex.name}${wb}${sub}</div>
        ${isSub&&origName?`<div style="font-size:10px;color:var(--muted);margin-top:1px">&#8627; sub for ${origName}</div>`:""}
        <div class="log-ex-prescribed">${ex.sets} sets &times; ${ex.reps}</div>
      </div>
      <div class="log-ex-progress ${allDone?"complete":""}" id="ep_${ck}">${done}/${ns}</div>
      <div class="log-ex-chev">&#9662;</div>
    </div>
    <div class="log-ex-sets" id="es_${ck}">
      ${setRows}
      <div class="rpe-row"><span class="rpe-label">RPE</span><div class="rpe-btns">${rpeBtns}</div></div>
      <div class="ex-notes-row"><textarea class="ex-notes-input" rows="1" placeholder="Notes..." onchange="saveF('${ck}_notes',this.value)">${savedNotes}</textarea></div>
    </div></div>`;
}
function toggleEx(ck){document.getElementById(`ec_${ck}`).classList.toggle("collapsed");}
function saveSF(sk,field,val,ck,ns){const data=loadLog();data[`${sk}_${field}`]=val;saveLog(data);}
function toggleSet(sk,ck,ns){
  const data=loadLog();data[`${sk}_done`]=!data[`${sk}_done`];saveLog(data);
  const isDone=!!data[`${sk}_done`];
  const chk=document.getElementById(`${sk}_chk`),row=document.getElementById(`${sk}_row`);
  if(chk){chk.innerHTML=isDone?"&#10003;":"";chk.className="set-check"+(isDone?" done":"");}
  if(row)row.className="set-row"+(isDone?" done-row":"");
  let done=0;for(let s=0;s<ns;s++)if(data[`${ck}_s${s}_done`])done++;
  const ep=document.getElementById(`ep_${ck}`);
  if(ep){ep.textContent=`${done}/${ns}`;ep.className="log-ex-progress"+(done===ns?" complete":"");}
}
function setRPE(ck,val){
  const data=loadLog(),k=`${ck}_rpe`;
  data[k]=(data[k]==val)?null:val;saveLog(data);
  [6,6.5,7,7.5,8,8.5,9,9.5,10].forEach(v=>{const b=document.getElementById(`rpe_${ck}_${String(v).replace(".","_")}`);if(b){const tier=v>=9.5?"sel-10":v>=9?"sel-9":v>=7.5?"sel-8":v>=6.5?"sel-7":"sel-6";b.className="rpe-btn"+(data[k]==v?" "+tier:"");}});
}
function saveF(key,val){const data=loadLog();data[key]=val;saveLog(data);}

// LOG RENDER
function buildLogWeekSel(){
  document.getElementById("log-week-sel").innerHTML=WEEKS.map((w,i)=>
    `<div class="log-week-chip ${i===logWeek?"active":""}" onclick="selLogWeek(${i},this)">${w.label}</div>`
  ).join("");
}
function selLogWeek(i,el){logWeek=i;document.querySelectorAll(".log-week-chip").forEach(c=>c.classList.remove("active"));el.classList.add("active");buildLogDayTabs();renderLog();}
function buildLogDayTabs(){
  document.getElementById("log-day-tabs").innerHTML=DAYS.map((d,i)=>
    `<div class="log-day-btn ${i===logDay?"active":""}" onclick="selLogDay(${i},this)">${d.day.slice(0,3)}<br><span style="font-size:9px;opacity:.7">${d.label}</span></div>`
  ).join("");
}
function selLogDay(i,el){logDay=i;document.querySelectorAll(".log-day-btn").forEach(b=>b.classList.remove("active"));el.classList.add("active");renderLog();}
function renderLog(){
  const data=loadLog(),d=DAYS[logDay];
  let html='<div class="log-section-label" style="color:#6888c8">Warmup & Prehab</div>';
  html+=buildPrehabBlock(logDay,data);
  html+='<div class="log-section-label" style="color:var(--green)">Training</div>';
  d.exercises.forEach((o,ei)=>{
    const{ex,isSub,origName}=getEx(logWeek,logDay,ei,false);
    html+=buildTrainingCard(ex,`w${logWeek}_d${logDay}_e${ei}`,data,isSub,origName);
  });
  html+=`<div class="log-section-label" style="color:var(--amber);margin-top:16px">Week ${logWeek+1} Report</div>`;
  html+='<div class="week-report-box">';
  REPORT_PROMPTS.forEach((p,pi)=>{
    const k=rKey(logWeek,pi),v=data[k]||"";
    html+=`<div class="report-field"><label>${p}</label><textarea placeholder="..." onchange="saveF('${k}',this.value)">${v}</textarea></div>`;
  });
  html+="</div>";
  html+='<button class="copy-btn" onclick="copyReport()">Copy Report to Clipboard</button>';
  html+=`<button class="clear-btn" onclick="clearWeek()">Clear Week ${logWeek+1} Data</button>`;
  html+='<p style="font-size:10px;color:var(--faint);font-family:var(--mono);text-align:center;margin-top:12px;line-height:1.6">Log saved on this device only.<br>Use Copy Report to share with Claude.</p>';
  document.getElementById("log-body").innerHTML=html;
}

// COPY REPORT
function copyReport(){
  const data=loadLog(),week=WEEKS[logWeek];
  let out=`WEEK ${logWeek+1} TRAINING REPORT - ${week.dates}\n${"-".repeat(44)}\n\n`;
  DAYS.forEach((d,di)=>{
    out+=`${d.day.toUpperCase()} - ${d.label}\n`;
    const base=`w${logWeek}_d${di}`;
    const mobDone=d.mobility.filter((_,mi)=>data[`${base}_mob${mi}_done`]);
    if(mobDone.length){
      out+=`  [Prehab: ${mobDone.length}/${d.mobility.length} done]\n`;
      d.mobility.forEach((m,mi)=>{
        if(!data[`${base}_mob${mi}_done`])return;
        const it=m.flags.includes("t");
        let line=`  checkmark ${m.name}`;
        if(it){const l=data[`${base}_mob${mi}_load`],p=data[`${base}_mob${mi}_pain`];line+=` - load=${l||"-"} - pain=${p!==undefined?p+"/10":"-"}`;}
        out+=line+"\n";
      });
      const pn=data[`${base}_prehab_notes`];if(pn)out+=`  Notes: ${pn}\n`;
    }
    d.exercises.forEach((o,ei)=>{
      const{ex,isSub,origName}=getEx(logWeek,di,ei,false);
      const ck=`w${logWeek}_d${di}_e${ei}`,ns=ex.sets;
      let lines=[];
      for(let s=0;s<ns;s++){
        const sk=`${ck}_s${s}`;if(!data[`${sk}_done`])continue;
        const l=data[`${sk}_load`],r=data[`${sk}_reps`],sec=data[`${sk}_sec`];
        lines.push(ex.timed?`    Set ${s+1}: ${sec||"-"} sec`:`    Set ${s+1}: ${l||"-"} lbs x ${r||"-"}`);
      }
      const rpe=data[`${ck}_rpe`],notes=data[`${ck}_notes`];
      if(lines.length||rpe||notes){
        out+=`  ${ex.name}${isSub?` [SUB for ${origName}]`:""}\n`;
        if(lines.length)out+=lines.join("\n")+"\n";
        if(rpe)out+=`    RPE: ${rpe}\n`;
        if(notes)out+=`    Notes: ${notes}\n`;
      }
    });
    out+="\n";
  });
  out+=`WEEKLY NOTES\n${"-".repeat(44)}\n`;
  REPORT_PROMPTS.forEach((p,pi)=>{const v=data[rKey(logWeek,pi)]||"-";out+=`${p}\n${v}\n\n`;});
  navigator.clipboard.writeText(out).then(()=>{
    const b=document.querySelector(".copy-btn");b.textContent="Copied!";b.classList.add("copied");
    setTimeout(()=>{b.textContent="Copy Report to Clipboard";b.classList.remove("copied");},2500);
  }).catch(()=>prompt("Copy this report:",out));
}
function clearWeek(){
  if(!confirm(`Clear all log data for Week ${logWeek+1}?`))return;
  const data=loadLog();Object.keys(data).forEach(k=>{if(k.startsWith(`w${logWeek}_`))delete data[k];});
  saveLog(data);renderLog();
}

// LIBRARY
const LG=[
  {f:"cat",btns:[{v:"all",l:"All types"},{v:"strength",l:"Strength"},{v:"skill",l:"Skill"},{v:"mobility",l:"Mobility"},{v:"conditioning",l:"Conditioning"}]},
  {f:"risk",btns:[{v:"all",l:"Any risk"},{v:"none",l:"No risk"},{v:"low",l:"Low"},{v:"moderate",l:"Moderate"},{v:"high",l:"High"}]},
  {f:"pattern",btns:[{v:"all",l:"Any pattern"},{v:"push",l:"Push"},{v:"pull",l:"Pull"},{v:"hinge",l:"Hinge"},{v:"squat",l:"Squat"},{v:"core",l:"Core"},{v:"carry",l:"Carry"}]},
  {f:"program",btns:[{v:"all",l:"All"},{v:"yes",l:"In program"}]}
];
function buildLibFilters(){
  document.getElementById("lib-filters").innerHTML=LG.map(g=>
    g.btns.map(b=>`<button class="lib-filter ${libFilters[g.f]===b.v?"active":""}" data-filter="${g.f}" data-val="${b.v}" onclick="setLibF('${g.f}','${b.v}',this)">${b.l}</button>`).join("")
  ).join('<span style="width:1px;background:var(--border);margin:0 4px;flex-shrink:0"></span>');
}
function setLibF(f,v,el){libFilters[f]=v;document.querySelectorAll(`.lib-filter[data-filter="${f}"]`).forEach(b=>b.classList.remove("active"));el.classList.add("active");renderLib();}
function renderLib(){
  const q=libQuery.toLowerCase();
  const vis=EXERCISES.filter(ex=>{
    if(libFilters.cat!=="all"&&ex.category!==libFilters.cat)return false;
    if(libFilters.risk!=="all"&&ex.risk!==libFilters.risk)return false;
    if(libFilters.pattern!=="all"&&ex.pattern!==libFilters.pattern)return false;
    if(libFilters.program==="yes"&&!ex.inProgram)return false;
    if(q){const s=[ex.name,ex.muscles,ex.pattern,ex.category,ex.equipment.join(" "),ex.notes,ex.difficulty].join(" ").toLowerCase();if(!s.includes(q))return false;}
    return true;
  });
  document.getElementById("lib-count").innerHTML=`Showing <span>${vis.length}</span> of ${EXERCISES.length} movements`;
  if(!vis.length){document.getElementById("lib-grid").innerHTML="";document.getElementById("lib-empty").style.display="block";return;}
  document.getElementById("lib-empty").style.display="none";
  const rl={none:"No biceps tendon risk",low:"Low tendon risk",moderate:"Moderate tendon risk",high:"High tendon risk"};
  document.getElementById("lib-grid").innerHTML=vis.map((ex,vi)=>{
    const tags=[
      `<span class="lib-tag lib-tag-${ex.category}">${ex.category}</span>`,
      `<span class="lib-tag lib-tag-plain">${ex.pattern}</span>`,
      ...ex.equipment.map(e=>`<span class="lib-tag lib-tag-plain">${e}</span>`),
      `<span class="lib-tag lib-tag-plain">${ex.difficulty}</span>`,
      ex.inProgram?'<span class="lib-tag lib-tag-inprog">in program</span>':"",
    ].join("");
    return`<div class="lib-card" id="lc-${vi}" onclick="toggleLib(${vi})">
      <div class="lib-card-header"><div class="lib-risk-dot risk-${ex.risk}"></div><div class="lib-card-name">${ex.name}</div><div class="lib-card-chev">&#9662;</div></div>
      <div class="lib-card-tags">${tags}</div>
      <div class="lib-card-expand">
        <div class="lib-muscles"><strong>Muscles:</strong> ${ex.muscles}</div>
        <div class="lib-notes" style="margin-top:8px">${ex.notes}</div>
        <div class="lib-risk-label risk-label-${ex.risk}">${rl[ex.risk]}</div>
      </div></div>`;
  }).join("");
}
function toggleLib(vi){document.getElementById(`lc-${vi}`).classList.toggle("open");}

// INIT
buildProgram();buildLogWeekSel();buildLogDayTabs();renderLog();buildLibFilters();renderLib();
document.getElementById("lib-search").addEventListener("input",e=>{libQuery=e.target.value;renderLib();});
</script>
