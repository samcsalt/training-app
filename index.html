<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Phase 1 — Training App</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0c0c0a;
  --bg2:     #141412;
  --bg3:     #1c1c19;
  --bg4:     #242420;
  --bg5:     #2c2c28;
  --border:  #2a2a26;
  --border2: #383830;
  --green:   #c8f060;
  --amber:   #f0b840;
  --red:     #f06040;
  --blue:    #60b8f0;
  --purple:  #a080f0;
  --text:    #e8e6de;
  --muted:   #88887e;
  --faint:   #44443e;
  --mono:    'IBM Plex Mono', monospace;
  --sans:    'IBM Plex Sans', sans-serif;
  --tab-h:   60px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--sans); font-weight: 300; }

/* ── Layout ── */
#app { display: flex; flex-direction: column; height: 100%; }
#view { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }

/* ── Tab bar ── */
#tabbar {
  display: flex;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bottom);
  height: calc(var(--tab-h) + var(--safe-bottom));
  flex-shrink: 0;
  z-index: 200;
}
.tab {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 4px; cursor: pointer;
  font-family: var(--mono); font-size: 9px; font-weight: 500;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--faint); transition: color 0.15s; padding-top: 4px;
}
.tab svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.tab.active { color: var(--green); }
.tab.active.log-tab { color: var(--amber); }
.tab.active.lib-tab { color: var(--blue); }

/* ── Shared ── */
.screen { display: none; padding: 0 0 24px; }
.screen.active { display: block; }
.page-header { padding: 20px 16px 12px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 50; }
.page-label { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--green); margin-bottom: 4px; }
.page-label.amber { color: var(--amber); }
.page-label.blue  { color: var(--blue); }
.page-title { font-family: var(--mono); font-size: 20px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
.section-label { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin: 20px 16px 8px; }
.pill { display: inline-block; font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 8px; border-radius: 3px; border: 1px solid; }
.pill-red    { color: var(--red);    border-color: #4a1a0a; background: #200a04; }
.pill-amber  { color: var(--amber);  border-color: #4a3a0a; background: #200a04; }
.pill-green  { color: var(--green);  border-color: #3a4a1a; background: #0a1400; }
.pill-blue   { color: var(--blue);   border-color: #1a3a4a; background: #040e18; }
.pill-muted  { color: var(--muted);  border-color: var(--border); }

/* ══════════════════════════════════════════════════
   PROGRAM TAB
══════════════════════════════════════════════════ */
.week-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 12px 16px; scrollbar-width: none; }
.week-scroll::-webkit-scrollbar { display: none; }
.week-btn {
  flex-shrink: 0; font-family: var(--mono); font-size: 10px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 7px 14px; border-radius: 4px; border: 1px solid var(--border2);
  background: var(--bg3); color: var(--muted); cursor: pointer; white-space: nowrap;
  transition: all 0.12s;
}
.week-btn:hover { color: var(--text); }
.week-btn.active { background: var(--bg4); border-color: var(--green); color: var(--green); }

.days-wrap { padding: 4px 16px 16px; display: flex; flex-direction: column; gap: 10px; }

.day-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden; cursor: pointer;
}
.day-header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px; user-select: none;
}
.day-pip { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.pip-upper   { background: var(--green); }
.pip-lower   { background: var(--amber); }
.pip-cond    { background: var(--purple); }
.pip-rest    { background: var(--faint); }
.day-label-wrap { flex: 1; }
.day-name { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--text); }
.day-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }
.day-chevron { font-family: var(--mono); font-size: 11px; color: var(--faint); transition: transform 0.2s; }
.day-card.open .day-chevron { transform: rotate(180deg); }

.day-body { display: none; border-top: 1px solid var(--border); }
.day-card.open .day-body { display: block; }

.ex-section-label {
  font-family: var(--mono); font-size: 9px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 10px 16px 4px; color: var(--faint);
}
.ex-section-label.mob { color: #3060a0; }

.ex-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 16px; border-bottom: 1px solid var(--border);
}
.ex-row:last-child { border-bottom: none; }
.ex-row.mob-row { background: #0a0a14; }
.ex-row.tendon-row { background: #140808; }

.ex-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.ex-main { flex: 1; min-width: 0; }
.ex-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3; }
.ex-name.watch { color: var(--red); }
.ex-name.new   { color: var(--amber); }
.ex-name.mob   { color: var(--blue); }
.ex-name.tendon{ color: var(--red); font-weight: 500; }
.ex-sets { font-family: var(--mono); font-size: 11px; color: var(--green); margin-top: 3px; }
.ex-sets.mob { color: var(--blue); }
.ex-sets.tendon { color: var(--red); }
.ex-note { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
.ex-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }

/* Swap button */
.swap-btn {
  flex-shrink: 0;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 4px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 4px 8px;
  cursor: pointer;
  margin-top: 2px;
  transition: all 0.12s;
  white-space: nowrap;
}
.swap-btn:hover { color: var(--amber); border-color: var(--amber); }
.swap-btn.swapped { color: var(--amber); border-color: var(--amber); background: #1a0e00; }

/* ══════════════════════════════════════════════════
   SWAP MODAL
══════════════════════════════════════════════════ */
#swap-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 500;
  padding: 0;
  align-items: flex-end;
  justify-content: center;
}
#swap-overlay.open { display: flex; }
#swap-sheet {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px 14px 0 0;
  width: 100%;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding-bottom: var(--safe-bottom);
}
#swap-header {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#swap-title {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 4px;
}
#swap-ex-name {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 10px;
}
#swap-search {
  width: 100%;
  background: var(--bg4);
  border: 1px solid var(--border2);
  border-radius: 5px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  padding: 8px 12px;
  outline: none;
  margin-bottom: 8px;
}
#swap-search:focus { border-color: var(--amber); }
#swap-search::placeholder { color: var(--faint); }
.swap-filter-row {
  display: flex;
  gap: 5px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.swap-filter-row::-webkit-scrollbar { display: none; }
.swap-filter-chip {
  flex-shrink: 0;
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 4px 9px;
  border-radius: 3px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
}
.swap-filter-chip.active { color: var(--amber); border-color: var(--amber); background: #1a0e00; }
#swap-list {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 8px 0;
}
.swap-ex-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
}
.swap-ex-item:active { background: var(--bg3); }
.swap-ex-item:last-child { border-bottom: none; }
.swap-item-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.swap-item-info { flex: 1; min-width: 0; }
.swap-item-name { font-size: 13px; font-weight: 500; color: var(--text); }
.swap-item-meta { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; }
.swap-item-arrow { color: var(--faint); font-size: 14px; }
.swap-list-empty { text-align: center; padding: 32px 16px; color: var(--muted); font-family: var(--mono); font-size: 11px; }
#swap-cancel {
  margin: 8px 16px;
  padding: 12px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  flex-shrink: 0;
}

/* ══════════════════════════════════════════════════
   SWAP SCOPE MODAL
══════════════════════════════════════════════════ */
#scope-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 600;
  align-items: flex-end;
  justify-content: center;
}
#scope-overlay.open { display: flex; }
#scope-sheet {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px 14px 0 0;
  width: 100%;
  padding: 20px 16px;
  padding-bottom: calc(20px + var(--safe-bottom));
}
#scope-title {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 6px;
}
#scope-desc {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 18px;
  line-height: 1.5;
}
.scope-btn {
  width: 100%;
  padding: 14px 16px;
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  margin-bottom: 8px;
  text-align: left;
}
.scope-btn-week {
  background: #1a0e00;
  border: 1px solid var(--amber);
  color: var(--amber);
}
.scope-btn-phase {
  background: #001814;
  border: 1px solid var(--blue);
  color: var(--blue);
}
.scope-btn-cancel {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--muted);
  margin-bottom: 0;
}
.scope-btn-sub { display: block; font-size: 9px; font-weight: 400; letter-spacing: 0.04em; color: inherit; opacity: 0.7; margin-top: 3px; text-transform: none; }

/* ══════════════════════════════════════════════════
   LOG TAB
══════════════════════════════════════════════════ */
.log-day-tabs { display: flex; gap: 6px; overflow-x: auto; padding: 12px 16px; scrollbar-width: none; }
.log-day-tabs::-webkit-scrollbar { display: none; }
.log-day-btn {
  flex-shrink: 0; font-family: var(--mono); font-size: 10px; font-weight: 600;
  letter-spacing: 0.05em; text-transform: uppercase;
  padding: 6px 12px; border-radius: 4px; border: 1px solid var(--border2);
  background: var(--bg3); color: var(--muted); cursor: pointer; white-space: nowrap;
}
.log-day-btn.active { background: var(--bg4); border-color: var(--amber); color: var(--amber); }

.log-body { padding: 8px 16px 24px; }

.log-ex-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 6px; margin-bottom: 8px; overflow: hidden;
}
.log-ex-card.mob-card { background: #0a0a14; border-color: #1a1a2a; }
.log-ex-card.tendon-card { background: #140808; border-color: #2a1010; }

.log-ex-header { padding: 10px 14px 6px; }
.log-ex-name { font-size: 13px; font-weight: 500; color: var(--text); }
.log-ex-name.watch { color: var(--red); }
.log-ex-name.mob   { color: var(--blue); }
.log-ex-name.tendon{ color: var(--red); }
.log-ex-sub-badge {
  display: inline-block;
  font-family: var(--mono);
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 2px;
  border: 1px solid var(--amber);
  color: var(--amber);
  background: #1a0e00;
  margin-left: 6px;
  vertical-align: middle;
}
.log-ex-prescribed { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; }

.log-inputs { display: grid; gap: 6px; padding: 0 14px 10px; }
.log-inputs.strength-inputs { grid-template-columns: 1fr 1fr 1fr; }
.log-inputs.tendon-inputs   { grid-template-columns: 1fr 1fr 1fr 1fr; }
.log-inputs.cond-inputs     { grid-template-columns: 1fr 1fr; }

.log-field { display: flex; flex-direction: column; gap: 3px; }
.log-field label { font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--faint); }
.log-field input, .log-field textarea {
  background: var(--bg4); border: 1px solid var(--border2);
  border-radius: 4px; color: var(--text); font-family: var(--sans);
  font-size: 14px; font-weight: 400; padding: 8px 10px; outline: none;
  transition: border-color 0.12s; width: 100%;
}
.log-field input:focus, .log-field textarea:focus { border-color: var(--amber); }
.log-field input.tendon-input:focus { border-color: var(--red); }
.log-field input::placeholder, .log-field textarea::placeholder { color: var(--faint); font-size: 13px; }
.log-field textarea { resize: none; height: 60px; font-size: 13px; }

.log-notes-wrap { padding: 0 14px 12px; }

.set-row { border-top: 1px solid var(--border); padding-bottom: 8px; }

.log-section-label {
  font-family: var(--mono); font-size: 9px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); padding: 16px 0 6px;
}

.week-report-box {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; margin: 8px 0;
}
.report-field { margin-bottom: 10px; }
.report-field:last-child { margin-bottom: 0; }
.report-field label { display: block; font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.report-field textarea {
  width: 100%; background: var(--bg4); border: 1px solid var(--border2);
  border-radius: 4px; color: var(--text); font-family: var(--sans);
  font-size: 13px; padding: 8px 10px; outline: none; resize: none;
  height: 52px; transition: border-color 0.12s;
}
.report-field textarea:focus { border-color: var(--amber); }

.copy-btn {
  width: 100%; padding: 14px; margin-top: 12px;
  background: var(--bg4); border: 1px solid var(--amber);
  border-radius: 6px; color: var(--amber);
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
  transition: background 0.15s;
}
.copy-btn:active { background: #2a1e00; }
.copy-btn.copied { background: #1a2800; border-color: var(--green); color: var(--green); }

.clear-btn {
  width: 100%; padding: 11px; margin-top: 8px;
  background: transparent; border: 1px solid var(--border2);
  border-radius: 6px; color: var(--muted);
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
}

.log-week-sel { display: flex; gap: 8px; overflow-x: auto; padding: 12px 16px 0; scrollbar-width: none; }
.log-week-sel::-webkit-scrollbar { display: none; }
.log-week-chip {
  flex-shrink: 0; font-family: var(--mono); font-size: 10px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 5px 12px; border-radius: 4px; border: 1px solid var(--border2);
  background: var(--bg3); color: var(--muted); cursor: pointer; white-space: nowrap;
}
.log-week-chip.active { background: var(--bg4); border-color: var(--amber); color: var(--amber); }

/* ══════════════════════════════════════════════════
   LIBRARY TAB
══════════════════════════════════════════════════ */
.lib-search-wrap { padding: 12px 16px 8px; position: relative; }
.lib-search-icon { position: absolute; left: 28px; top: 50%; transform: translateY(-50%); font-family: var(--mono); font-size: 12px; color: var(--muted); pointer-events: none; }
#lib-search {
  width: 100%; background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 6px; color: var(--text); font-family: var(--sans);
  font-size: 14px; padding: 10px 12px 10px 34px; outline: none;
  transition: border-color 0.12s;
}
#lib-search:focus { border-color: var(--blue); }
#lib-search::placeholder { color: var(--faint); }

.lib-filters { display: flex; gap: 5px; overflow-x: auto; padding: 0 16px 10px; scrollbar-width: none; }
.lib-filters::-webkit-scrollbar { display: none; }
.lib-filter {
  flex-shrink: 0; font-family: var(--mono); font-size: 9px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 5px 10px; border-radius: 3px; border: 1px solid var(--border2);
  background: transparent; color: var(--muted); cursor: pointer; white-space: nowrap;
}
.lib-filter.active { background: var(--bg4); color: var(--text); border-color: var(--border2); }
.lib-filter.active[data-val="strength"]    { border-color: var(--green);  color: var(--green); }
.lib-filter.active[data-val="skill"]       { border-color: var(--amber);  color: var(--amber); }
.lib-filter.active[data-val="mobility"]    { border-color: var(--blue);   color: var(--blue); }
.lib-filter.active[data-val="conditioning"]{ border-color: var(--purple); color: var(--purple); }
.lib-filter.active[data-val="none"]        { border-color: var(--green);  color: var(--green); }
.lib-filter.active[data-val="low"]         { border-color: var(--amber);  color: var(--amber); }
.lib-filter.active[data-val="moderate"]    { border-color: #f08040;       color: #f08040; }
.lib-filter.active[data-val="high"]        { border-color: var(--red);    color: var(--red); }
.lib-filter.active[data-val="yes"]         { border-color: var(--green);  color: var(--green); }

.lib-count { font-family: var(--mono); font-size: 10px; color: var(--muted); padding: 0 16px 8px; }
.lib-count span { color: var(--blue); font-weight: 600; }

.lib-grid { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 8px; }

.lib-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 6px; overflow: hidden; cursor: pointer;
}
.lib-card-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }
.lib-risk-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.risk-none     { background: var(--green); }
.risk-low      { background: var(--amber); }
.risk-moderate { background: #f08040; }
.risk-high     { background: var(--red); }
.lib-card-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); }
.lib-card-chev { font-family: var(--mono); font-size: 10px; color: var(--faint); transition: transform 0.15s; }
.lib-card.open .lib-card-chev { transform: rotate(180deg); }
.lib-card-tags { display: flex; gap: 4px; flex-wrap: wrap; padding: 0 14px 10px; }

// STATE
// ═══════════════════════════════════════════════════════
let activeWeek = 3; // default to Week 4 (index 3)
let logWeek = 3;
let logDay = 0;
let libFilters = { cat:"all", risk:"all", pattern:"all", program:"all" };
let libQuery = "";
const STORAGE_KEY = "phase1_log_v1";
const SWAPS_KEY = "phase1_swaps_v1";

// Swap state
let swapContext = null;
let swapPending = null;
let swapFilter = "all";

function loadLog() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
}
function saveLog(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}
function loadSwaps() {
  try { return JSON.parse(localStorage.getItem(SWAPS_KEY)) || {}; } catch(e) { return {}; }
}
function saveSwaps(data) {
  try { localStorage.setItem(SWAPS_KEY, JSON.stringify(data)); } catch(e) {}
}

function weekSwapKey(week, dayIdx, exIdx, isMob) {
  return `week_${week}_d${dayIdx}_${isMob?'mob':'ex'}_${exIdx}`;
}
function phaseSwapKey(dayIdx, exIdx, isMob) {
  return `phase_d${dayIdx}_${isMob?'mob':'ex'}_${exIdx}`;
}

function getEffectiveEx(week, dayIdx, exIdx, isMob) {
  const swaps = loadSwaps();
  const wKey = weekSwapKey(week, dayIdx, exIdx, isMob);
  const pKey = phaseSwapKey(dayIdx, exIdx, isMob);
  const arr = isMob ? DAYS[dayIdx].mobility : DAYS[dayIdx].exercises;
  const original = arr[exIdx];

  let swapName = swaps[wKey] || swaps[pKey] || null;
  if (!swapName) return { ex: original, isSwapped: false, originalName: null };

  const found = EXERCISES.find(e => e.name === swapName);
  if (!found) return { ex: original, isSwapped: false, originalName: null };

  const swappedEx = {
    name: found.name,
    sets: original.sets,
    reps: original.reps,
    note: `[Substitution for ${original.name}] ${found.notes}`,
    flags: original.flags,
    timed: original.timed,
    pattern: found.pattern,
  };
  return { ex: swappedEx, isSwapped: true, originalName: original.name };
}

function reportKey(week, field) {
  return `w${week}_report_${field}`;
}

function buildProgram() {

    `<button class="week-btn ${i===activeWeek?'active':''}" onclick="selectWeek(${i},this)">${w.label}<br><span style="font-size:9px;opacity:.6">${w.dates}</span></button>`
  ).join('');
  renderDays();
}

function selectWeek(i, el) {
  activeWeek = i;
  document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderDays();
}

function pipClass(type) {
  return { upper:'pip-upper', lower:'pip-lower', cond:'pip-cond' }[type] || 'pip-rest';
}

function flagPill(flags) {
  if (flags.includes('w')) return '<span class="pill pill-red">⚠ Tendon watch</span>';
  if (flags.includes('t')) return '<span class="pill pill-red">⚑ Tendon protocol</span>';
  if (flags.includes('n')) return '<span class="pill pill-amber">New</span>';
  return '';
}

function renderDays() {
  const wrap = document.getElementById('days-wrap');
  wrap.innerHTML = DAYS.map((d, di) => {
    const exRows = d.exercises.map((origEx, ei) => {
      const {ex, isSwapped, originalName} = getEffectiveEx(activeWeek, di, ei, false);
      const nameClass = ex.flags.includes('w') ? 'watch' : ex.flags.includes('n') ? 'new' : '';
      const swappedBadge = isSwapped ? `<span class="pill pill-amber">⇄ Sub</span>` : '';
      const dotColor = ex.flags.includes('w') ? 'var(--red)' : isSwapped ? 'var(--amber)' : ex.flags.includes('n') ? 'var(--amber)' : 'var(--faint)';
      return `<div class="ex-row">
        <div class="ex-dot" style="background:${dotColor}"></div>
        <div class="ex-main">
          <div class="ex-name ${nameClass}">${ex.name} ${flagPill(ex.flags)} ${swappedBadge}</div>
          ${isSwapped ? `<div style="font-size:10px;color:var(--muted);margin-top:1px">↳ replaces ${originalName}</div>` : ''}
          <div class="ex-sets">${ex.sets} sets × ${ex.reps}</div>
          <div class="ex-note">${ex.note}</div>
        </div>
        <button class="swap-btn ${isSwapped?'swapped':''}" onclick="event.stopPropagation();openSwap(${di},${ei},false,'${ex.pattern||'pull'}')">${isSwapped?'⇄ Swap':'Swap'}</button>
      </div>`;
    }).join('');

    const mobRows = d.mobility.map((origEx, mi) => {
      const {ex, isSwapped, originalName} = getEffectiveEx(activeWeek, di, mi, true);
      const isTendon = ex.flags.includes('t');
      const swappedBadge = isSwapped ? `<span class="pill pill-amber">⇄ Sub</span>` : '';
      return `<div class="ex-row ${isTendon?'tendon-row':'mob-row'}">
        <div class="ex-dot" style="background:${isTendon?'var(--red)':'var(--blue)'}"></div>
        <div class="ex-main">
          <div class="ex-name ${isTendon?'tendon':'mob'}">${ex.name} ${isTendon?'<span class="pill pill-red">⚑ Protocol</span>':''} ${swappedBadge}</div>
          ${isSwapped ? `<div style="font-size:10px;color:var(--muted);margin-top:1px">↳ replaces ${originalName}</div>` : ''}
          <div class="ex-sets ${isTendon?'tendon':'mob'}">${ex.sets} sets × ${ex.reps}</div>
          <div class="ex-note">${ex.note}</div>
        </div>
        <button class="swap-btn ${isSwapped?'swapped':''}" onclick="event.stopPropagation();openSwap(${di},${mi},true,'${ex.pattern||'pull'}')">${isSwapped?'⇄ Swap':'Swap'}</button>
      </div>`;
    }).join('');

    return `<div class="day-card" id="prog-day-${di}">
      <div class="day-header" onclick="toggleDay(${di})">
        <div class="day-pip ${pipClass(d.type)}"></div>
        <div class="day-label-wrap">
          <div class="day-name">${d.day} — ${d.label}</div>
          <div class="day-sub">${d.sub}</div>
        </div>
        <div class="day-chevron">▾</div>
      </div>
      <div class="day-body">
        <div class="ex-section-label">Training</div>
        ${exRows}
        <div class="ex-section-label mob">Mobility & Tendon Work · ~10–15 min</div>
        ${mobRows}
      </div>
    </div>`;
  }).join('');
}

function toggleDay(di) {
  const card = document.getElementById(`prog-day-${di}`);
  card.classList.toggle('open');
}

// ═══════════════════════════════════════════════════════
// SWAP MODAL
// ═══════════════════════════════════════════════════════
function openSwap(dayIdx, exIdx, isMob, pattern) {
  swapContext = {dayIdx, exIdx, isMob, pattern};
  swapFilter = pattern || "all";

  const {ex} = getEffectiveEx(activeWeek, dayIdx, exIdx, isMob);

  document.getElementById('swap-ex-name').textContent = ex.name;
  document.getElementById('swap-search').value = '';

  const patterns = ["all","push","pull","hinge","squat","core","carry"];
  document.getElementById('swap-filter-row').innerHTML = patterns.map(p =>
    `<button class="swap-filter-chip ${swapFilter===p?'active':''}" onclick="setSwapFilter('${p}',this)">${p==='all'?'All patterns':p}</button>`
  ).join('');

  filterSwapList();
  document.getElementById('swap-overlay').classList.add('open');
  document.getElementById('swap-search').focus();
}

function setSwapFilter(p, el) {
  swapFilter = p;
  document.querySelectorAll('.swap-filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  filterSwapList();
}

function filterSwapList() {
  const q = document.getElementById('swap-search').value.toLowerCase();
  const list = document.getElementById('swap-list');

  const filtered = EXERCISES.filter(ex => {
    if (swapFilter !== 'all' && ex.pattern !== swapFilter) return false;
    if (q) {
      const s = [ex.name, ex.muscles, ex.category, ex.pattern, ex.notes].join(' ').toLowerCase();
      if (!s.includes(q)) return false;
    }
    return true;
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div class="swap-list-empty">No exercises match. Try a different filter.</div>';
    return;
  }

  const riskColors = {none:'var(--green)',low:'var(--amber)',moderate:'#f08040',high:'var(--red)'};
  list.innerHTML = filtered.map(ex =>
    `<div class="swap-ex-item" onclick="selectSwapEx('${ex.name.replace(/'/g,"\\'")}')">
      <div class="swap-item-dot" style="background:${riskColors[ex.risk]||'var(--faint)'}"></div>
      <div class="swap-item-info">
        <div class="swap-item-name">${ex.name}</div>
        <div class="swap-item-meta">${ex.category} · ${ex.pattern} · ${ex.difficulty} · tendon: ${ex.risk}</div>
      </div>
      <div class="swap-item-arrow">›</div>
    </div>`
  ).join('');
}

function selectSwapEx(exName) {
  swapPending = {...swapContext, newExName: exName};
  closeSwap();
  const {dayIdx, exIdx, isMob} = swapContext;
  const {ex} = getEffectiveEx(activeWeek, dayIdx, exIdx, isMob);
  document.getElementById('scope-desc').textContent =
    `Replacing "${ex.name}" with "${exName}"`;
  document.getElementById('scope-overlay').classList.add('open');
}

function closeSwap() {
  document.getElementById('swap-overlay').classList.remove('open');
}

function closeSwapIfBackground(e) {
  if (e.target === document.getElementById('swap-overlay')) closeSwap();
}

function closeScope() {
  document.getElementById('scope-overlay').classList.remove('open');
  swapPending = null;
}

function closeScopeIfBackground(e) {
  if (e.target === document.getElementById('scope-overlay')) closeScope();
}

function confirmSwap(scope) {
  if (!swapPending) return;
  const {dayIdx, exIdx, isMob, newExName} = swapPending;
  const swaps = loadSwaps();

  if (scope === 'week') {
    const wKey = weekSwapKey(activeWeek, dayIdx, exIdx, isMob);
    swaps[wKey] = newExName;
  } else {
    const pKey = phaseSwapKey(dayIdx, exIdx, isMob);
    swaps[pKey] = newExName;
    for (let w = 0; w < activeWeek; w++) {
      const oldWKey = weekSwapKey(w, dayIdx, exIdx, isMob);
      delete swaps[oldWKey];
    }
  }

  saveSwaps(swaps);
  closeScope();
  swapPending = null;
  renderDays();
}

function buildLogWeekSel() {
  const el = document.getElementById('log-week-sel');
  el.innerHTML = WEEKS.map((w,i) =>
    `<div class="log-week-chip ${i===logWeek?'active':''}" onclick="selectLogWeek(${i},this)">${w.label}</div>`
  ).join('');
}

function selectLogWeek(i, el) {
  logWeek = i;
  document.querySelectorAll('.log-week-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  buildLogDayTabs();
  renderLogBody();
}

function buildLogDayTabs() {
  const el = document.getElementById('log-day-tabs');
  el.innerHTML = DAYS.map((d,i) =>
    `<div class="log-day-btn ${i===logDay?'active':''}" onclick="selectLogDay(${i},this)">${d.day.slice(0,3)}<br><span style="font-size:9px;opacity:.7">${d.label}</span></div>`
  ).join('');
}

function selectLogDay(i, el) {
  logDay = i;
  document.querySelectorAll('.log-day-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderLogBody();
}

function renderLogBody() {
  const logData = loadLog();
  const day = DAYS[logDay];
  const exOffset = day.exercises.length;

  let html = '';

  html += `<div class="log-section-label" style="color:var(--green)">Training</div>`;
  day.exercises.forEach((origEx, i) => {
    const {ex, isSwapped, originalName} = getEffectiveEx(logWeek, logDay, i, false);
    const isTendon = ex.flags.includes('t');
    const isWatch = ex.flags.includes('w');
    const isCond = ex.name.toLowerCase().includes('bike') || ex.name.toLowerCase().includes('amrap') || ex.reps.includes('min');
    html += buildLogCard(ex, i, logData, isTendon, isWatch, isCond, false, isSwapped, originalName);
  });

  html += `<div class="log-section-label" style="color:var(--blue)">Mobility & Tendon Work</div>`;
  day.mobility.forEach((origEx, i) => {
    const {ex, isSwapped, originalName} = getEffectiveEx(logWeek, logDay, i, true);
    const isTendon = ex.flags.includes('t');
    html += buildLogCard(ex, exOffset + i, logData, isTendon, false, false, true, isSwapped, originalName);
  });

  html += `<div class="log-section-label" style="color:var(--amber);margin-top:24px">Week ${logWeek+1} Report</div>`;
  html += `<div class="week-report-box">`;
  REPORT_PROMPTS.forEach((prompt, pi) => {
    const key = reportKey(logWeek, pi);
    const val = logData[key] || '';
    html += `<div class="report-field">
      <label>${prompt}</label>
      <textarea placeholder="…" data-rkey="${key}" oninput="saveField(this,'${key}')">${val}</textarea>
    </div>`;
  });
  html += `</div>`;
  html += `<button class="copy-btn" onclick="copyReport()">Copy Report to Clipboard</button>`;
  html += `<button class="clear-btn" onclick="clearWeek()">Clear Week ${logWeek+1} Data</button>`;
  html += `<p style="font-size:10px;color:var(--faint);font-family:var(--mono);text-align:center;margin-top:12px;line-height:1.6">Log is saved on this device only.<br>Use Copy Report to share with Claude.</p>`;

  document.getElementById('log-body').innerHTML = html;
}

function buildLogCard(ex, idx, logData, isTendon, isWatch, isCond, isMob, isSwapped, originalName) {
  const baseKey = `w${logWeek}_d${logDay}_e${idx}`;
  const note = logData[baseKey+'_note'] || '';
  const numSets = parseInt(ex.sets) || 1;
  const isTimed = ex.timed === true;
  const isEccentric = ex.name.toLowerCase().includes('eccentric') && ex.name.toLowerCase().includes('curl');

  const cardClass = isTendon ? 'tendon-card' : isMob ? 'mob-card' : '';
  const nameClass = isWatch ? 'watch' : isTendon ? 'tendon' : isMob ? 'mob' : '';
  const subBadge = isSwapped ? `<span class="log-ex-sub-badge">Sub</span>` : '';

  let setRows = '';
  for (let s = 0; s < numSets; s++) {
    const sk = `${baseKey}_s${s}`;
    const sv_load = logData[sk+'_load'] || '';
    const sv_reps = logData[sk+'_reps'] || '';
    const sv_rpe  = logData[sk+'_rpe']  || '';
    const sv_pain = logData[sk+'_pain'] || '';
    const sv_sec  = logData[sk+'_sec']  || '';

    let rowInputs = '';
    if (isEccentric) {
      rowInputs = `
        <div class="log-field"><label>Load (lbs)</label><input type="number" inputmode="decimal" step=".5" placeholder="—" value="${sv_load}" oninput="saveField(this,'${sk}_load')"></div>
        <div class="log-field"><label>Reps/arm</label><input type="number" inputmode="numeric" placeholder="5" value="${sv_reps}" oninput="saveField(this,'${sk}_reps')"></div>
        <div class="log-field"><label>Tempo (sec)</label><input type="number" inputmode="numeric" placeholder="4" value="${sv_sec}" oninput="saveField(this,'${sk}_sec')"></div>
        <div class="log-field"><label>Pain (0–10)</label><input type="number" inputmode="decimal" class="tendon-input" placeholder="—" min="0" max="10" step=".5" value="${sv_pain}" oninput="saveField(this,'${sk}_pain')"></div>`;
      setRows += `<div class="set-row" style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;padding:4px 14px 0;">
        <div style="grid-column:1/-1;font-family:var(--mono);font-size:9px;color:var(--faint);padding-top:4px">SET ${s+1}</div>
        ${rowInputs}
      </div>`;
    } else if (isCond || (isTimed && !isTendon)) {
      const durLabel = isCond ? (ex.name.toLowerCase().includes('amrap') ? 'Rounds done' : 'Duration (min)') : 'Time (sec)';
      rowInputs = `
        <div class="log-field"><label>${durLabel}</label><input type="number" inputmode="numeric" placeholder="—" value="${sv_reps}" oninput="saveField(this,'${sk}_reps')"></div>
        <div class="log-field"><label>RPE (1–10)</label><input type="number" inputmode="decimal" placeholder="—" min="1" max="10" step=".5" value="${sv_rpe}" oninput="saveField(this,'${sk}_rpe')"></div>`;
      setRows += `<div class="set-row" style="display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:4px 14px 0;">
        <div style="grid-column:1/-1;font-family:var(--mono);font-size:9px;color:var(--faint);padding-top:4px">SET ${s+1}</div>
        ${rowInputs}
      </div>`;
    } else if (isTendon) {
      rowInputs = `
        <div class="log-field"><label>Load (lbs)</label><input type="number" inputmode="decimal" step=".5" placeholder="—" value="${sv_load}" oninput="saveField(this,'${sk}_load')"></div>
        <div class="log-field"><label>Time (sec)</label><input type="number" inputmode="numeric" placeholder="—" value="${sv_reps}" oninput="saveField(this,'${sk}_reps')"></div>
        <div class="log-field"><label>RPE</label><input type="number" inputmode="decimal" placeholder="—" min="1" max="10" step=".5" value="${sv_rpe}" oninput="saveField(this,'${sk}_rpe')"></div>
        <div class="log-field"><label>Pain (0–10)</label><input type="number" inputmode="decimal" class="tendon-input" placeholder="—" min="0" max="10" step=".5" value="${sv_pain}" oninput="saveField(this,'${sk}_pain')"></div>`;
      setRows += `<div class="set-row" style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;padding:4px 14px 0;">
        <div style="grid-column:1/-1;font-family:var(--mono);font-size:9px;color:var(--faint);padding-top:4px">SET ${s+1}</div>
        ${rowInputs}
      </div>`;
    } else {
      rowInputs = `
        <div class="log-field"><label>Load (lbs)</label><input type="number" inputmode="decimal" step=".5" placeholder="—" value="${sv_load}" oninput="saveField(this,'${sk}_load')"></div>
        <div class="log-field"><label>Reps done</label><input type="number" inputmode="numeric" placeholder="—" value="${sv_reps}" oninput="saveField(this,'${sk}_reps')"></div>
        <div class="log-field"><label>RPE (1–10)</label><input type="number" inputmode="decimal" placeholder="—" min="1" max="10" step=".5" value="${sv_rpe}" oninput="saveField(this,'${sk}_rpe')"></div>`;
      setRows += `<div class="set-row" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:4px 14px 0;">
        <div style="grid-column:1/-1;font-family:var(--mono);font-size:9px;color:var(--faint);padding-top:4px">SET ${s+1}</div>
        ${rowInputs}
      </div>`;
    }
  }

  return `<div class="log-ex-card ${cardClass}">
    <div class="log-ex-header">
      <div class="log-ex-name ${nameClass}">${ex.name}${subBadge}</div>
      ${isSwapped && originalName ? `<div style="font-size:10px;color:var(--muted);margin-top:1px">↳ substitution for ${originalName}</div>` : ''}
      <div class="log-ex-prescribed">${ex.sets} sets × ${ex.reps}</div>
    </div>
    ${setRows}
    <div class="log-notes-wrap" style="padding-top:8px">
      <div class="log-field"><label>Notes</label><textarea placeholder="Cues, substitutions, how it felt…" oninput="saveField(this,'${baseKey}_note')">${note}</textarea></div>
    </div>
  </div>`;
}

function saveField(el, key) {
  const data = loadLog();
  data[key] = el.value;
  saveLog(data);
}

function copyReport() {
  const data = loadLog();
  const week = WEEKS[logWeek];
  let out = `WEEK ${logWeek+1} TRAINING REPORT — ${week.dates}\n${'─'.repeat(44)}\n\n`;

  DAYS.forEach((day, di) => {
    out += `${day.day.toUpperCase()} — ${day.label}\n`;
    const exOffset = day.exercises.length;

    day.exercises.forEach((origEx, i) => {
      const {ex, isSwapped, originalName} = getEffectiveEx(logWeek, di, i, false);
      const base = `w${logWeek}_d${di}_e${i}`;
      const note = data[base+'_note'];
      const numSets = parseInt(ex.sets) || 1;
      const isEccentric = ex.name.toLowerCase().includes('eccentric') && ex.name.toLowerCase().includes('curl');
      const isTimed = ex.timed === true;
      const isCond = ex.name.toLowerCase().includes('bike') || ex.name.toLowerCase().includes('amrap') || ex.reps.includes('min');

      let setLines = [];
      for (let s = 0; s < numSets; s++) {
        const sk = `${base}_s${s}`;
        const load = data[sk+'_load'], reps = data[sk+'_reps'], rpe = data[sk+'_rpe'],
              pain = data[sk+'_pain'], sec = data[sk+'_sec'];
        if (load||reps||rpe||pain||sec) {
          if (isEccentric) {
            setLines.push(`    Set ${s+1}: load=${load||'—'} reps=${reps||'—'}/arm tempo=${sec||'—'}sec pain=${pain||'—'}/10`);
          } else if (isCond || (isTimed && !ex.flags.includes('t'))) {
            setLines.push(`    Set ${s+1}: time=${reps||'—'} rpe=${rpe||'—'}`);
          } else {
            setLines.push(`    Set ${s+1}: load=${load||'—'} reps=${reps||'—'} rpe=${rpe||'—'}`);
          }
        }
      }
      if (setLines.length || note || isSwapped) {
        const subTag = isSwapped ? ` [SUB for ${originalName}]` : '';
        out += `  ${ex.name}${subTag}:\n`;
        if (setLines.length) out += setLines.join('\n') + '\n';
        if (note) out += `    Note: ${note}\n`;
      }
    });

    out += '  [Mobility]\n';
    day.mobility.forEach((origEx, i) => {
      const {ex, isSwapped, originalName} = getEffectiveEx(logWeek, di, i, true);
      const base = `w${logWeek}_d${di}_e${exOffset+i}`;
      const note = data[base+'_note'];
      const numSets = parseInt(ex.sets) || 1;
      const isEccentric = ex.name.toLowerCase().includes('eccentric') && ex.name.toLowerCase().includes('curl');
      const isTendon = ex.flags.includes('t');
      const isTimed = ex.timed === true;

      let setLines = [];
      for (let s = 0; s < numSets; s++) {
        const sk = `${base}_s${s}`;
        const load = data[sk+'_load'], reps = data[sk+'_reps'], rpe = data[sk+'_rpe'],
              pain = data[sk+'_pain'], sec = data[sk+'_sec'];
        if (load||reps||rpe||pain||sec) {
          if (isEccentric) {
            setLines.push(`    Set ${s+1}: load=${load||'—'} reps=${reps||'—'}/arm tempo=${sec||'—'}sec pain=${pain||'—'}/10`);
          } else if (isTendon) {
            setLines.push(`    Set ${s+1}: load=${load||'—'} time=${reps||'—'}sec rpe=${rpe||'—'} pain=${pain||'—'}/10`);
          } else if (isTimed) {
            setLines.push(`    Set ${s+1}: time=${reps||'—'}sec rpe=${rpe||'—'}`);
          } else {
            setLines.push(`    Set ${s+1}: load=${load||'—'} reps=${reps||'—'} rpe=${rpe||'—'}`);
          }
        }
      }
      if (setLines.length || note || isSwapped) {
        const subTag = isSwapped ? ` [SUB for ${originalName}]` : '';
        out += `  ${ex.name}${subTag}:\n`;
        if (setLines.length) out += setLines.join('\n') + '\n';
        if (note) out += `    Note: ${note}\n`;
      }
    });
    out += '\n';
  });

  out += `WEEKLY NOTES\n${'─'.repeat(44)}\n`;
  REPORT_PROMPTS.forEach((p, pi) => {
    const val = data[reportKey(logWeek, pi)] || '—';
    out += `${p}\n${val}\n\n`;
  });

  navigator.clipboard.writeText(out).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy Report to Clipboard';
      btn.classList.remove('copied');
    }, 2500);
  }).catch(() => {
    prompt("Copy this report:", out);
  });
}

function clearWeek() {
  if (!confirm(`Clear all log data for Week ${logWeek+1}?`)) return;
  const data = loadLog();
  Object.keys(data).forEach(k => {
    if (k.startsWith(`w${logWeek}_`)) delete data[k];
  });
  saveLog(data);
  renderLogBody();
}

// ═══════════════════════════════════════════════════════
// LIBRARY TAB
// ═══════════════════════════════════════════════════════
const LIB_FILTER_GROUPS = [
  { filter:"cat", buttons:[
    {val:"all",label:"All types"},{val:"strength",label:"Strength"},{val:"skill",label:"Skill"},
    {val:"mobility",label:"Mobility"},{val:"conditioning",label:"Conditioning"}
  ]},
  { filter:"risk", buttons:[
    {val:"all",label:"Any risk"},{val:"none",label:"No risk"},{val:"low",label:"Low"},
    {val:"moderate",label:"Moderate"},{val:"high",label:"High"}
  ]},
  { filter:"pattern", buttons:[
    {val:"all",label:"Any pattern"},{val:"push",label:"Push"},{val:"pull",label:"Pull"},
    {val:"hinge",label:"Hinge"},{val:"squat",label:"Squat"},{val:"core",label:"Core"},{val:"carry",label:"Carry"}
  ]},
  { filter:"program", buttons:[
    {val:"all",label:"All"},{val:"yes",label:"In program"}
  ]},
];

function buildLibFilters() {
  const el = document.getElementById('lib-filters');
  el.innerHTML = LIB_FILTER_GROUPS.map(g =>
    g.buttons.map(b =>
      `<button class="lib-filter ${libFilters[g.filter]===b.val?'active':''}" data-filter="${g.filter}" data-val="${b.val}" onclick="setLibFilter('${g.filter}','${b.val}',this)">${b.label}</button>`
    ).join('')
  ).join('<span style="width:1px;background:var(--border);margin:0 4px;flex-shrink:0"></span>');
}

function setLibFilter(f, v, el) {
  libFilters[f] = v;
  document.querySelectorAll(`.lib-filter[data-filter="${f}"]`).forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderLibrary();
}

function renderLibrary() {
  const q = libQuery.toLowerCase();
  const visible = EXERCISES.filter(ex => {
    if (libFilters.cat !== 'all' && ex.category !== libFilters.cat) return false;
    if (libFilters.risk !== 'all' && ex.risk !== libFilters.risk) return false;
    if (libFilters.pattern !== 'all' && ex.pattern !== libFilters.pattern) return false;
    if (libFilters.program === 'yes' && !ex.inProgram) return false;
    if (q) {
      const s = [ex.name, ex.muscles, ex.pattern, ex.category, ex.equipment.join(' '), ex.notes, ex.difficulty].join(' ').toLowerCase();
      if (!s.includes(q)) return false;
    }
    return true;
  });

  document.getElementById('lib-count').innerHTML = `Showing <span>${visible.length}</span> of ${EXERCISES.length} movements`;

  if (visible.length === 0) {
    document.getElementById('lib-grid').innerHTML = '';
    document.getElementById('lib-empty').style.display = 'block';
    return;
  }
  document.getElementById('lib-empty').style.display = 'none';

  const riskLabels = {none:"No biceps tendon risk",low:"Low tendon risk",moderate:"Moderate tendon risk",high:"High tendon risk"};
  document.getElementById('lib-grid').innerHTML = visible.map((ex, vi) => {
    const tags = [
      `<span class="lib-tag lib-tag-${ex.category}">${ex.category}</span>`,
      `<span class="lib-tag lib-tag-plain">${ex.pattern}</span>`,
      ...ex.equipment.map(e => `<span class="lib-tag lib-tag-plain">${e}</span>`),
      `<span class="lib-tag lib-tag-plain">${ex.difficulty}</span>`,
      ex.inProgram ? `<span class="lib-tag lib-tag-inprog">in program</span>` : '',
    ].join('');

    return `<div class="lib-card" id="lib-${vi}" onclick="toggleLib(${vi})">
      <div class="lib-card-header">
        <div class="lib-risk-dot risk-${ex.risk}" title="${riskLabels[ex.risk]}"></div>
        <div class="lib-card-name">${ex.name}</div>
        <div class="lib-card-chev">▾</div>
      </div>
      <div class="lib-card-tags">${tags}</div>
      <div class="lib-card-expand">
        <div class="lib-muscles"><strong>Muscles:</strong> ${ex.muscles}</div>
        <div class="lib-notes" style="margin-top:8px">${ex.notes}</div>
        <div class="lib-risk-label risk-label-${ex.risk}">${riskLabels[ex.risk]}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleLib(vi) {
  document.getElementById(`lib-${vi}`).classList.toggle('open');
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
buildProgram();
buildLogWeekSel();
buildLogDayTabs();
renderLogBody();
buildLibFilters();
renderLibrary();

document.getElementById('lib-search').addEventListener('input', e => {
  libQuery = e.target.value;
  renderLibrary();
});
</script>
